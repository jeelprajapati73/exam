name: Deploy MERN App with Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Login to DockerHub
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build & Push Frontend
    - name: Build Frontend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend ./frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend

    # Build & Push Backend
    - name: Build Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend ./backend
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend

    # Deploy on EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop frontend || true
          docker stop backend || true
          docker stop mongo || true

          docker rm frontend || true
          docker rm backend || true
          docker rm mongo || true

          docker network create mern-net || true

          docker pull ${{ secrets.DOCKER_USERNAME }}/mern-frontend
          docker pull ${{ secrets.DOCKER_USERNAME }}/mern-backend

          docker run -d --name mongo --network mern-net mongo

          docker run -d --name backend \
            --network mern-net \
            -p 5000:5000 \
            ${{ secrets.DOCKER_USERNAME }}/mern-backend

          docker run -d --name frontend \
            -p 80:80 \
            ${{ secrets.DOCKER_USERNAME }}/mern-frontend
